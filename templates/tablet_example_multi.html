<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Factory Example Multi Tablet Template</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 2560px;
        height: 1600px;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #101828;
        color: #ffffff;
      }

      .stage {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 0.78fr 1.22fr;
        align-items: center;
        gap: 96px;
        padding: 112px 128px;
        background:
          linear-gradient(135deg, rgba(36, 99, 235, 0.32), transparent 42%),
          linear-gradient(180deg, #172033 0%, #101828 100%);
      }

      .eyebrow {
        font-size: 40px;
        font-weight: 700;
        color: #8bd3ff;
      }

      h1 {
        max-width: 780px;
        margin: 28px 0 0;
        font-size: 92px;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .screens {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 48px;
        align-items: center;
      }

      .device {
        height: 980px;
        padding: 22px;
        border-radius: 62px;
        background: #0b1220;
        box-shadow: 0 36px 84px rgba(0, 0, 0, 0.42);
      }

      .device.secondary {
        transform: translateY(72px);
        opacity: 0.92;
      }

      .screen {
        width: 100%;
        height: 100%;
        border-radius: 42px;
        overflow: hidden;
        background: #ffffff;
      }

      .screen img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section>
        <div class="eyebrow">Multi-slot example</div>
        <h1 id="title">Combine related app screens.</h1>
      </section>

      <section class="screens">
        <div class="device secondary">
          <div class="screen">
            <img id="secondary" alt="" />
          </div>
        </div>
        <div class="device primary">
          <div class="screen">
            <img id="primary" alt="" />
          </div>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title');
      const fallback = params.get('screenshot');
      const screenshots = JSON.parse(params.get('screenshots') || '{}');

      if (title) {
        document.getElementById('title').textContent = title;
      }

      document.getElementById('primary').src = screenshots.primary || fallback || '';
      document.getElementById('secondary').src = screenshots.secondary || fallback || '';
    </script>
  </body>
</html>
