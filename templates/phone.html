<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Factory Example Phone Template</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      .stage {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 120px 92px 100px;
        background:
          radial-gradient(circle at 15% 10%, rgba(44, 123, 229, 0.18), transparent 32%),
          linear-gradient(145deg, #ffffff 0%, #edf2f7 100%);
      }

      .eyebrow {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0;
        color: #2c7be5;
      }

      h1 {
        max-width: 860px;
        margin: 24px 0 48px;
        font-size: 78px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .device {
        align-self: center;
        justify-self: center;
        width: 720px;
        height: 1280px;
        padding: 22px;
        border-radius: 76px;
        background: #111827;
        box-shadow: 0 42px 110px rgba(23, 32, 51, 0.28);
      }

      .screen {
        width: 100%;
        height: 100%;
        border-radius: 56px;
        overflow: hidden;
        background: #ffffff;
      }

      .screen img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .footer {
        font-size: 28px;
        color: #526070;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <header>
        <div class="eyebrow">Screenshot Factory</div>
        <h1 id="title">Store screenshots, rendered locally.</h1>
      </header>

      <section class="device">
        <div class="screen">
          <img id="screenshot" alt="" />
        </div>
      </section>

      <div class="footer">Example template. Keep app-specific designs in custom_ templates.</div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title');
      const screenshot = params.get('screenshot');

      if (title) {
        document.getElementById('title').textContent = title;
      }

      if (screenshot) {
        document.getElementById('screenshot').src = screenshot;
      }
    </script>
  </body>
</html>
