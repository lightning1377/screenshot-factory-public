<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Factory Example Tablet Template</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 2560px;
        height: 1600px;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      .stage {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: 0.86fr 1.14fr;
        gap: 96px;
        align-items: center;
        padding: 120px 128px;
        background:
          radial-gradient(circle at 88% 12%, rgba(44, 123, 229, 0.2), transparent 30%),
          linear-gradient(145deg, #ffffff 0%, #edf2f7 100%);
      }

      .eyebrow {
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 0;
        color: #2c7be5;
      }

      h1 {
        max-width: 860px;
        margin: 28px 0 36px;
        font-size: 96px;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .copy {
        max-width: 700px;
        font-size: 34px;
        line-height: 1.35;
        color: #526070;
      }

      .device {
        justify-self: end;
        width: 1320px;
        height: 930px;
        padding: 24px;
        border-radius: 64px;
        background: #111827;
        box-shadow: 0 42px 110px rgba(23, 32, 51, 0.28);
      }

      .screen {
        width: 100%;
        height: 100%;
        border-radius: 42px;
        overflow: hidden;
        background: #ffffff;
      }

      .screen img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section>
        <div class="eyebrow">Screenshot Factory</div>
        <h1 id="title">Store screenshots, rendered locally.</h1>
        <p class="copy">
          This public template is intentionally simple. Keep app-specific designs in ignored
          custom_ templates.
        </p>
      </section>

      <section class="device">
        <div class="screen">
          <img id="screenshot" alt="" />
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title');
      const screenshot = params.get('screenshot');

      if (title) {
        document.getElementById('title').textContent = title;
      }

      if (screenshot) {
        document.getElementById('screenshot').src = screenshot;
      }
    </script>
  </body>
</html>
